################################################################################
# KlipperScreen toolchanger-ui macro reference
################################################################################
#
# PURPOSE
#   This file is a reference/example macro pack for the `toolchanger-ui` branch.
#   It is meant to help new users understand what macros the UI expects and how
#   those macros can be adapted for their own printer.
#
# IMPORTANT
#   This is a STARTING POINT, not a universal drop-in config.
#   You will almost certainly need to adjust:
#     - temperatures
#     - filament movement lengths/speeds
#     - move-to-load positions
#     - tool count
#     - your own toolchanger's real select/drop commands
#
# ASSUMPTIONS
#   This example assumes:
#     - a working Klipper toolchanger setup already exists
#     - SELECT_TOOL T=<n> is a valid way to pick up a tool
#     - UNSELECT_TOOL already exists in your toolchanger setup OR you will
#       replace the placeholder note below with your own implementation
#     - Moonraker + Spoolman are configured if you want spool assignment support
#     - printer.toolchanger.tool_names exists for the multi-tool helpers
#
# WHAT THE UI EXPECTS
#   Required commands/macros:
#     - T0, T1, T2, T3, ...       tool select macros
#     - UNSELECT_TOOL             drop current tool
#     - LOAD_FILAMENT TOOL=<n>    tool-aware load wrapper
#     - UNLOAD_FILAMENT TOOL=<n>  tool-aware unload wrapper
#     - PID_TUNE HEATER=<h> TARGET=<t>
#
#   Optional but recommended:
#     - SET_ACTIVE_SPOOL / CLEAR_ACTIVE_SPOOL
#     - _load_spoolman_variables delayed_gcode
#     - LIST_HEATERS
#     - LOAD_ALL_FILAMENT / UNLOAD_ALL_FILAMENT
#
################################################################################


################################################################################
# REQUIRED SUPPORT CONFIG
################################################################################

[save_variables]
description: Required if you want spool IDs to persist across restarts
filename: ~/printer_data/config/saved_variables.cfg


################################################################################
# TOOL DROP
################################################################################
#
# KlipperScreen calls UNSELECT_TOOL directly.
# Your printer must provide a working UNSELECT_TOOL command somewhere in your
# toolchanger configuration.
#
# DO NOT create a recursive macro like this:
#   [gcode_macro UNSELECT_TOOL]
#   gcode:
#       UNSELECT_TOOL
#
# If your printer already has a working UNSELECT_TOOL command, leave it alone.
# If your toolchanger uses a different command name, create a wrapper like:
#
# [gcode_macro UNSELECT_TOOL]
# description: Example wrapper - replace DROP_CURRENT_TOOL with your own command
# gcode:
#   DROP_CURRENT_TOOL
#
################################################################################


################################################################################
# TOOL SELECT MACROS
################################################################################
#
# These are required by the toolchanger-ui branch.
# Each Tn macro should:
#   - select the correct tool
#   - expose variable_spool_id
#   - restore active spool info if a spool is already assigned
#
# Duplicate the pattern below for however many tools your machine has.
################################################################################

[gcode_macro T0]
description: Select tool 0 and restore its assigned spool ID if present
variable_active: 0
variable_color: ""
variable_spool_id: 0
gcode:
    {% set svv = printer.save_variables.variables %}
    SELECT_TOOL T=0
    {% if svv.t0__spool_id is defined and svv.t0__spool_id %}
        SET_GCODE_VARIABLE MACRO=T0 VARIABLE=spool_id VALUE={svv.t0__spool_id}
        SET_ACTIVE_SPOOL ID={svv.t0__spool_id} TOOL=0
    {% endif %}

[gcode_macro T1]
description: Select tool 1 and restore its assigned spool ID if present
variable_active: 0
variable_color: ""
variable_spool_id: 0
gcode:
    {% set svv = printer.save_variables.variables %}
    SELECT_TOOL T=1
    {% if svv.t1__spool_id is defined and svv.t1__spool_id %}
        SET_GCODE_VARIABLE MACRO=T1 VARIABLE=spool_id VALUE={svv.t1__spool_id}
        SET_ACTIVE_SPOOL ID={svv.t1__spool_id} TOOL=1
    {% endif %}

[gcode_macro T2]
description: Select tool 2 and restore its assigned spool ID if present
variable_active: 0
variable_color: ""
variable_spool_id: 0
gcode:
    {% set svv = printer.save_variables.variables %}
    SELECT_TOOL T=2
    {% if svv.t2__spool_id is defined and svv.t2__spool_id %}
        SET_GCODE_VARIABLE MACRO=T2 VARIABLE=spool_id VALUE={svv.t2__spool_id}
        SET_ACTIVE_SPOOL ID={svv.t2__spool_id} TOOL=2
    {% endif %}

[gcode_macro T3]
description: Select tool 3 and restore its assigned spool ID if present
variable_active: 0
variable_color: ""
variable_spool_id: 0
gcode:
    {% set svv = printer.save_variables.variables %}
    SELECT_TOOL T=3
    {% if svv.t3__spool_id is defined and svv.t3__spool_id %}
        SET_GCODE_VARIABLE MACRO=T3 VARIABLE=spool_id VALUE={svv.t3__spool_id}
        SET_ACTIVE_SPOOL ID={svv.t3__spool_id} TOOL=3
    {% endif %}


################################################################################
# SPOOLMAN HELPERS
################################################################################
#
# These are recommended if you want spool assignment / restore / active spool
# tracking to work cleanly with the UI.
################################################################################

[delayed_gcode _load_spoolman_variables]
description: Restore saved spool IDs into tool macros after restart
initial_duration: 3
gcode:
    {% set svv = printer.save_variables.variables %}

    {% if 't0__spool_id' in svv %}
        RESPOND MSG="Setting T0 to spool {svv.t0__spool_id}"
        SET_ACTIVE_SPOOL ID={svv.t0__spool_id} TOOL=0
        SET_GCODE_VARIABLE MACRO=T0 VARIABLE=spool_id VALUE={svv.t0__spool_id}
    {% endif %}

    {% if 't1__spool_id' in svv %}
        RESPOND MSG="Setting T1 to spool {svv.t1__spool_id}"
        SET_ACTIVE_SPOOL ID={svv.t1__spool_id} TOOL=1
        SET_GCODE_VARIABLE MACRO=T1 VARIABLE=spool_id VALUE={svv.t1__spool_id}
    {% endif %}

    {% if 't2__spool_id' in svv %}
        RESPOND MSG="Setting T2 to spool {svv.t2__spool_id}"
        SET_ACTIVE_SPOOL ID={svv.t2__spool_id} TOOL=2
        SET_GCODE_VARIABLE MACRO=T2 VARIABLE=spool_id VALUE={svv.t2__spool_id}
    {% endif %}

    {% if 't3__spool_id' in svv %}
        RESPOND MSG="Setting T3 to spool {svv.t3__spool_id}"
        SET_ACTIVE_SPOOL ID={svv.t3__spool_id} TOOL=3
        SET_GCODE_VARIABLE MACRO=T3 VARIABLE=spool_id VALUE={svv.t3__spool_id}
    {% endif %}

[gcode_macro SET_ACTIVE_SPOOL]
description: Tell Moonraker/Spoolman which spool is active, optionally per tool
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {% if params.TOOL is defined %}
      {% set tool = params.TOOL|int %}
      {action_call_remote_method(
         "spoolman_set_active_spool",
         spool_id=id,
         tool=tool
      )}
    {% else %}
      {action_call_remote_method(
         "spoolman_set_active_spool",
         spool_id=id
      )}
    {% endif %}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
description: Clear the currently active spool in Moonraker/Spoolman
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}


################################################################################
# PID TUNING HELPERS
################################################################################
#
# Required by the toolchanger panel's PID popup.
################################################################################

[gcode_macro PID_TUNE]
description: PID tune heaters using HEATER=<bed/extruder/extruder1/etc> TARGET=<temp>
gcode:
  {% set HEATER = params.HEATER|default("extruder")|lower %}
  {% set TARGET_TEMP = params.TARGET|default(200)|float %}

  {% if HEATER == "heater_bed" or HEATER == "bed" %}
    {% set HEATER = "heater_bed" %}
    {% set TARGET_TEMP = params.TARGET|default(60)|float %}
  {% elif HEATER.startswith("extruder") or HEATER.startswith("t") %}
    {% if HEATER.startswith("t") %}
      {% set tool_num = HEATER[1:]|int %}
      {% if tool_num == 0 %}
        {% set HEATER = "extruder" %}
      {% else %}
        {% set HEATER = "extruder" ~ tool_num %}
      {% endif %}
    {% endif %}
    {% set TARGET_TEMP = params.TARGET|default(200)|float %}
  {% endif %}

  {% if HEATER in printer.heaters.available_heaters %}
    {action_respond_info("Starting PID calibration for %s at %d°C" % (HEATER, TARGET_TEMP))}
    PID_CALIBRATE HEATER={HEATER} TARGET={TARGET_TEMP}
    SAVE_CONFIG
  {% else %}
    {action_respond_info("ERROR: Heater '%s' not found!" % HEATER)}
    {action_respond_info("Available heaters: %s" % (printer.heaters.available_heaters|join(', ')))}
  {% endif %}

[gcode_macro LIST_HEATERS]
description: Optional helper - list all available heaters for debugging
gcode:
  {action_respond_info("Available heaters: %s" % (printer.heaters.available_heaters|join(', ')))}


################################################################################
# FILAMENT MOVE HELPERS
################################################################################
#
# These are example filament load/unload macros for a 4-tool configuration.
# Adjust temperatures, lengths, positions, and speeds for your printer.
#
# IMPORTANT
#   The UI calls:
#     LOAD_FILAMENT TOOL=<n>
#     UNLOAD_FILAMENT TOOL=<n>
#
#   These wrappers are therefore REQUIRED if you want the panel buttons to work
#   the same way as the example setup below.
################################################################################

[gcode_macro MOVE_TO_LOAD]
description: Move to a convenient load/unload position; edit positions for your printer
variable_load_x_idle: 175
variable_load_y_idle: 175
variable_load_z_idle: 50
variable_load_x_printing: 175
variable_load_y_printing: 350
variable_travel_speed: 1800
gcode:
  {% set saved_offset_x = printer.gcode_move.homing_origin.x %}
  {% set saved_offset_y = printer.gcode_move.homing_origin.y %}
  {% set saved_offset_z = printer.gcode_move.homing_origin.z %}

  SAVE_GCODE_STATE NAME=BEFORE_MOVE_TO_LOAD

  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

  G90
  {% if not (printer.print_stats.state == "paused" or printer.idle_timeout.state == "Printing") %}
    G1 Z{load_z_idle} F{travel_speed}
    G1 X{load_x_idle} Y{load_y_idle} F{travel_speed}
  {% else %}
    G1 X{load_x_printing} Y{load_y_printing} F{travel_speed}
  {% endif %}

  RESTORE_GCODE_STATE NAME=BEFORE_MOVE_TO_LOAD
  SET_GCODE_OFFSET X={saved_offset_x} Y={saved_offset_y} Z={saved_offset_z} MOVE=0


################################################################################
# REQUIRED UI WRAPPERS
################################################################################

[gcode_macro LOAD_FILAMENT]
description: UI-facing wrapper - load filament for TOOL=<n>; forwards to LOAD_ONE_FILAMENT
gcode:
  {% if 'TOOL' not in params %}
    RESPOND TYPE=error MSG="TOOL parameter required! Usage: LOAD_FILAMENT TOOL=0"
    M117 Error: Missing TOOL
  {% else %}
    {% set TOOL_NUM = params.TOOL|int %}
    {% set TEMP_ARG = params.TEMP|default("") %}
    {% if TEMP_ARG != "" %}
      LOAD_ONE_FILAMENT TOOL={TOOL_NUM} TEMP={TEMP_ARG}
    {% else %}
      LOAD_ONE_FILAMENT TOOL={TOOL_NUM}
    {% endif %}
  {% endif %}

[gcode_macro UNLOAD_FILAMENT]
description: UI-facing wrapper - unload filament for TOOL=<n>; forwards to UNLOAD_ONE_FILAMENT
gcode:
  {% if 'TOOL' not in params %}
    RESPOND TYPE=error MSG="TOOL parameter required! Usage: UNLOAD_FILAMENT TOOL=0"
    M117 Error: Missing TOOL
  {% else %}
    {% set TOOL_NUM = params.TOOL|int %}
    {% set TEMP_ARG = params.TEMP|default("") %}
    {% if TEMP_ARG != "" %}
      UNLOAD_ONE_FILAMENT TOOL={TOOL_NUM} TEMP={TEMP_ARG}
    {% else %}
      UNLOAD_ONE_FILAMENT TOOL={TOOL_NUM}
    {% endif %}
  {% endif %}


################################################################################
# SINGLE-TOOL IMPLEMENTATIONS USED BY THE WRAPPERS
################################################################################

[gcode_macro LOAD_ONE_FILAMENT]
description: Load filament for a specific tool; usage LOAD_ONE_FILAMENT TOOL=0 [TEMP=240]
variable_ignore_min_extrude_temp: True
variable_load_temp: 240
variable_extrude_length: 50
variable_extrude_speed: 300
variable_retract_length: 4
variable_retract_speed: 1800
variable_num_extrude_passes: 2
variable_turn_off_heater: True
gcode:
  {% if 'TOOL' not in params %}
    RESPOND TYPE=error MSG="TOOL parameter required! Usage: LOAD_ONE_FILAMENT TOOL=0"
    M117 Error: Missing TOOL
  {% else %}

  {% set TOOL_NUM = params.TOOL|int %}
  {% set TEMP = params.TEMP|default(load_temp)|float %}

  {% if TOOL_NUM < 0 or TOOL_NUM >= printer.toolchanger.tool_names|length %}
    RESPOND TYPE=error MSG="Invalid tool number! Must be 0-{printer.toolchanger.tool_names|length - 1}"
    M117 Error: Invalid Tool
  {% else %}

  {% set tool_name = printer.toolchanger.tool_names[TOOL_NUM] %}
  {% set extruder = printer[tool_name].extruder %}

  M117 Loading T{TOOL_NUM}
  RESPOND TYPE=echo MSG="Loading filament for Tool {TOOL_NUM} ({tool_name})"

  MOVE_TO_LOAD
  M104 T{TOOL_NUM} S{TEMP}
  TEMPERATURE_WAIT SENSOR={extruder} MINIMUM={TEMP}

  ACTIVATE_EXTRUDER EXTRUDER={extruder}

  M83
  {% for pass in range(num_extrude_passes) %}
    RESPOND TYPE=echo MSG="Extruding {extrude_length}mm (pass {pass + 1}/{num_extrude_passes})"
    G1 E{extrude_length} F{extrude_speed}
  {% endfor %}

  RESPOND TYPE=echo MSG="Retracting {retract_length}mm to prevent ooze"
  G1 E-{retract_length} F{retract_speed}

  M82
  M400

  {% if turn_off_heater %}
    M104 T{TOOL_NUM} S0
    RESPOND TYPE=echo MSG="Heater turned off"
  {% else %}
    RESPOND TYPE=echo MSG="Heater left on"
  {% endif %}

  M117 Loading Complete
  RESPOND TYPE=echo MSG="Filament loading complete for Tool {TOOL_NUM}"

  {% endif %}
  {% endif %}

[gcode_macro UNLOAD_ONE_FILAMENT]
description: Unload filament for a specific tool; usage UNLOAD_ONE_FILAMENT TOOL=0 [TEMP=240]
variable_ignore_min_extrude_temp: True
variable_unload_temp: 240
variable_prime_length: 5
variable_prime_speed: 500
variable_retract_length: 50
variable_retract_speed: 1000
variable_num_retract_passes: 2
variable_turn_off_heater: True
gcode:
  {% if 'TOOL' not in params %}
    RESPOND TYPE=error MSG="TOOL parameter required! Usage: UNLOAD_ONE_FILAMENT TOOL=0"
    M117 Error: Missing TOOL
  {% else %}

  {% set TOOL_NUM = params.TOOL|int %}
  {% set TEMP = params.TEMP|default(unload_temp)|float %}

  {% if TOOL_NUM < 0 or TOOL_NUM >= printer.toolchanger.tool_names|length %}
    RESPOND TYPE=error MSG="Invalid tool number! Must be 0-{printer.toolchanger.tool_names|length - 1}"
    M117 Error: Invalid Tool
  {% else %}

  {% set tool_name = printer.toolchanger.tool_names[TOOL_NUM] %}
  {% set extruder = printer[tool_name].extruder %}

  M117 Unloading T{TOOL_NUM}
  RESPOND TYPE=echo MSG="Unloading filament from Tool {TOOL_NUM} ({tool_name})"

  MOVE_TO_LOAD
  M104 T{TOOL_NUM} S{TEMP}
  TEMPERATURE_WAIT SENSOR={extruder} MINIMUM={TEMP}

  ACTIVATE_EXTRUDER EXTRUDER={extruder}

  M83
  RESPOND TYPE=echo MSG="Priming {prime_length}mm"
  G1 E{prime_length} F{prime_speed}

  {% for pass in range(num_retract_passes) %}
    RESPOND TYPE=echo MSG="Retracting {retract_length}mm (pass {pass + 1}/{num_retract_passes})"
    G1 E-{retract_length} F{retract_speed}
  {% endfor %}

  M82
  M400

  {% if turn_off_heater %}
    M104 T{TOOL_NUM} S0
    RESPOND TYPE=echo MSG="T{TOOL_NUM} heater turned off"
  {% else %}
    RESPOND TYPE=echo MSG="Heater left on"
  {% endif %}

  M117 T{TOOL_NUM} Unload Complete
  RESPOND TYPE=echo MSG="Tool {TOOL_NUM} unloading complete"

  {% endif %}
  {% endif %}


################################################################################
# OPTIONAL BATCH HELPERS
################################################################################
#
# These are convenience macros only. The UI does not require them.
################################################################################

[gcode_macro LOAD_ALL_FILAMENT]
description: Optional helper - load filament into all tools sequentially
variable_load_temp: 240
variable_extrude_length: 50
variable_extrude_speed: 300
variable_retract_length: 4
variable_retract_speed: 1800
variable_num_extrude_passes: 2
variable_preheat_all_tools: True
variable_turn_off_heaters: False
gcode:
  {% set TEMP = params.TEMP|default(load_temp)|float %}
  {% set tools = printer.toolchanger.tool_names %}
  {% set tool_count = tools|length %}

  M117 Loading All {tool_count} Tools
  RESPOND TYPE=echo MSG="Starting batch load for {tool_count} tools"

  {% if preheat_all_tools %}
    RESPOND TYPE=echo MSG="Phase 1: Pre-heating all tools"
    {% for tool in tools %}
      {% set tool_num = printer[tool].tool_number %}
      M104 T{tool_num} S{TEMP}
      RESPOND TYPE=echo MSG="Started heating T{tool_num}"
    {% endfor %}
  {% endif %}

  RESPOND TYPE=echo MSG="Phase 2: Loading each tool sequentially"
  {% for tool in tools %}
    {% set tool_num = printer[tool].tool_number %}
    {% set extruder = printer[tool].extruder %}

    M117 Loading T{tool_num}

    {% if not preheat_all_tools %}
      M104 T{tool_num} S{TEMP}
    {% endif %}
    RESPOND TYPE=echo MSG="Waiting for T{tool_num} to reach {TEMP}°C"
    TEMPERATURE_WAIT SENSOR={extruder} MINIMUM={TEMP}

    ACTIVATE_EXTRUDER EXTRUDER={extruder}

    M83
    {% for pass in range(num_extrude_passes) %}
      RESPOND TYPE=echo MSG="T{tool_num}: Extruding {extrude_length}mm ({pass + 1}/{num_extrude_passes})"
      G1 E{extrude_length} F{extrude_speed}
    {% endfor %}

    RESPOND TYPE=echo MSG="T{tool_num}: Retracting {retract_length}mm to prevent ooze"
    G1 E-{retract_length} F{retract_speed}

    RESPOND TYPE=echo MSG="T{tool_num}: Load complete"
  {% endfor %}

  M400
  M82

  {% if turn_off_heaters %}
    TURN_OFF_HEATERS
    RESPOND TYPE=echo MSG="All heaters turned off"
  {% endif %}

  M117 All {tool_count} Tools Loaded
  RESPOND TYPE=echo MSG="Batch load complete - all {tool_count} tools ready"

[gcode_macro UNLOAD_ALL_FILAMENT]
description: Optional helper - unload filament from all tools sequentially
variable_unload_temp: 250
variable_prime_length: 5
variable_prime_speed: 500
variable_retract_length: 50
variable_retract_speed: 1000
variable_num_retract_passes: 2
variable_preheat_all_tools: True
variable_turn_off_heaters: True
gcode:
  {% set TEMP = params.TEMP|default(unload_temp)|float %}
  {% set tools = printer.toolchanger.tool_names %}
  {% set tool_count = tools|length %}

  M117 Unloading All {tool_count} Tools
  RESPOND TYPE=echo MSG="Starting batch unload for {tool_count} tools"

  {% if preheat_all_tools %}
    RESPOND TYPE=echo MSG="Phase 1: Pre-heating all tools"
    {% for tool in tools %}
      {% set tool_num = printer[tool].tool_number %}
      M104 T{tool_num} S{TEMP}
      RESPOND TYPE=echo MSG="Started heating T{tool_num}"
    {% endfor %}
  {% endif %}

  RESPOND TYPE=echo MSG="Phase 2: Unloading each tool sequentially"
  {% for tool in tools %}
    {% set tool_num = printer[tool].tool_number %}
    {% set extruder = printer[tool].extruder %}

    M117 Unloading T{tool_num}

    {% if not preheat_all_tools %}
      M104 T{tool_num} S{TEMP}
    {% endif %}
    RESPOND TYPE=echo MSG="Waiting for T{tool_num} to reach {TEMP}°C"
    TEMPERATURE_WAIT SENSOR={extruder} MINIMUM={TEMP}

    ACTIVATE_EXTRUDER EXTRUDER={extruder}

    M83
    RESPOND TYPE=echo MSG="T{tool_num}: Priming {prime_length}mm"
    G1 E{prime_length} F{prime_speed}

    {% for pass in range(num_retract_passes) %}
      RESPOND TYPE=echo MSG="T{tool_num}: Retracting {retract_length}mm ({pass + 1}/{num_retract_passes})"
      G1 E-{retract_length} F{retract_speed}
    {% endfor %}

    RESPOND TYPE=echo MSG="T{tool_num}: Unload complete"
  {% endfor %}

  M400
  M82

  {% if turn_off_heaters %}
    TURN_OFF_HEATERS
    RESPOND TYPE=echo MSG="All heaters turned off"
  {% endif %}

  M117 All {tool_count} Tools Unloaded
  RESPOND TYPE=echo MSG="Batch unload complete - all {tool_count} tools ready"

